---
# Install NetBird (WireGuard-based mesh VPN) from the official apt repo, install and
# enable the daemon. Connecting is interactive/key-based and NOT done here - run it
# yourself: `netbird up` (prints an SSO URL on headless) or `netbird up --setup-key <key>`.

- name: netbird - dependencies
  become: true
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: netbird - apt signing key (armored, used directly via signed-by)
  become: true
  ansible.builtin.get_url:
    url: https://pkgs.netbird.io/debian/public.key
    dest: /usr/share/keyrings/netbird-archive-keyring.asc
    mode: "0644"

- name: netbird - apt source
  become: true
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/netbird.list
    content: "deb [signed-by=/usr/share/keyrings/netbird-archive-keyring.asc] https://pkgs.netbird.io/debian stable main\n"
    mode: "0644"

- name: netbird - install
  become: true
  ansible.builtin.apt:
    name: netbird
    state: present
    update_cache: true

# Some package versions don't register the systemd unit automatically; this is a no-op
# when it already exists.
- name: netbird - ensure service is installed
  become: true
  ansible.builtin.command: netbird service install
  register: nb_service_install
  changed_when: false
  failed_when: false

- name: netbird - enable and start service
  become: true
  ansible.builtin.systemd:
    name: netbird
    enabled: true
    state: started
