---
# Provision a headless Debian netbook (applied via scripts/provision.sh netbook).
# apt/locales/services run under become; dotfiles run as the current user (become: false).

- name: apt - install core packages (fresh cache)
  become: true
  ansible.builtin.apt:
    name: "{{ netbook_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: apt - optional packages (do not fail if missing in repo)
  become: true
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  loop: "{{ netbook_packages_optional }}"
  failed_when: false

- name: locales - uncomment en_US/ru_RU in /etc/locale.gen
  become: true
  ansible.builtin.lineinfile:
    path: /etc/locale.gen
    regexp: '^# *{{ item }} UTF-8'
    line: '{{ item }} UTF-8'
  loop:
    - en_US.UTF-8
    - ru_RU.UTF-8

- name: locales - list already generated
  ansible.builtin.command: locale -a
  register: locales_avail
  changed_when: false

# Must run BEFORE update-locale as a regular task (not a handler): a handler runs at the
# end of the play, so LANG would be set to a not-yet-generated locale (Can not set LC_ALL).
- name: locales - generate (if en_US.UTF-8 is missing)
  become: true
  ansible.builtin.command: locale-gen
  when: "'en_US.utf8' not in locales_avail.stdout"
  changed_when: true

- name: console - font with Cyrillic glyphs (readable non-ASCII on tty)
  become: true
  ansible.builtin.lineinfile:
    path: /etc/default/console-setup
    regexp: '^{{ item.k }}='
    line: '{{ item.k }}="{{ item.v }}"'
    create: true
  loop:
    - { k: CODESET,  v: Uni2 }      # Latin + Cyrillic + Greek
    - { k: FONTFACE, v: Terminus }
    - { k: FONTSIZE, v: 8x16 }
  notify: setupcon

- name: locale - default LANG (UTF-8)
  become: true
  ansible.builtin.command: update-locale LANG=en_US.UTF-8
  changed_when: false

- name: services - enable and start gpm and NetworkManager
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - gpm
    - NetworkManager

- name: dotfiles - settings block in ~/.bashrc (idempotent)
  become: false
  ansible.builtin.blockinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    create: true
    marker: "# {mark} netbook-provision"
    block: |
      HISTSIZE=100000; HISTFILESIZE=200000; HISTCONTROL=ignoreboth
      shopt -s histappend checkwinsize autocd cdspell
      PROMPT_COMMAND='history -a'
      # sbin in PATH for the user (Debian omits it) - net tools: ip/ss/ethtool/...
      case ":$PATH:" in *:/usr/sbin:*) ;; *) export PATH="$PATH:/usr/local/sbin:/usr/sbin:/sbin";; esac
      alias ll='ls -lah --color=auto'
      alias bat='batcat'; alias fd='fdfind'
      alias grep='grep --color=auto'
      [ -f /usr/share/doc/fzf/examples/key-bindings.bash ] && . /usr/share/doc/fzf/examples/key-bindings.bash
      [ -f /usr/share/bash-completion/bash_completion ] && . /usr/share/bash-completion/bash_completion

- name: dotfiles - ~/.tmux.conf (managed by role)
  become: false
  ansible.builtin.copy:
    src: tmux.conf
    dest: "{{ ansible_env.HOME }}/.tmux.conf"
