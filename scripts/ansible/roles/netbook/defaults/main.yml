---
# Packages for a headless Debian netbook: terminal QoL, Wi-Fi manager, net debug, 3G modem.
netbook_packages:
  - tmux            # persistent sessions/splits/scrollback
  - mosh            # SSH over flaky links (handy for the 3G gateway)
  - mc              # Midnight Commander (norton-style)
  - fzf             # fuzzy finder (Ctrl-R/Ctrl-T)
  - ripgrep
  - fd-find
  - bat
  - htop
  - ncdu
  - bash-completion
  - command-not-found
  - micro
  - locales
  - console-setup   # console font (Cyrillic on tty)
  - gpm             # mouse on the console (tty)
  - network-manager # Wi-Fi: nmtui/nmcli
  - tcpdump         # net debug
  - iproute2
  - mtr-tiny
  - nmap
  - ethtool
  - iperf3
  - usb-modeswitch  # 3G modem
  - modemmanager
  - git             # clone the start repo
  - make            # make targets
  - python3-venv    # run CLI without uv (scripts/run.sh -> .venv)
  - python3-pip

# Optional - installed one by one, do not fail if missing (name/availability varies by
# Debian release).
netbook_packages_optional:
  - fbterm          # framebuffer terminal (scrollback/fonts/mouse on console)
  - tldr            # command cheatsheets (missing/renamed in some releases)
