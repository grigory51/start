# Ansible для локального провижининга машин из домена «Команды».
# Обёртки (напр. scripts/netbook-provision.sh) прогоняют плейбуки против localhost
# (connection=local). Роли — в ./roles.
[defaults]
roles_path = ./roles
interpreter_python = auto_silent
retry_files_enabled = false
localhost_warning = false
gathering = smart
