# config.toml — что линковать в ~/.claude (агенты, навыки, hooks)
#
# Источники скилов
# ----------------
# Каждый источник скилов — отдельный [[skills]], включая локальную папку repo/skills.
# Порядок записей задаёт приоритет при конфликте имён (берётся первое вхождение).
#
#   path     — путь к папке-источнику относительно корня репо. Внутри неё каждый
#              подкаталог с SKILL.md считается скилом.
#   include  — какие скилы брать: "*" (все) либо список имён папок. По умолчанию "*".
#   exclude  — какие скилы НЕ брать (имена папок). Применяется поверх include.
#   enabled  — false выключает весь источник целиком.
#   symlinks — список [[skills.symlinks]] = {source, destination}: доп. symlink,
#              добавляемый в КАЖДОЕ зеркало скила этого источника. source — путь
#              относительно корня репо; destination — имя/путь внутри папки-зеркала
#              скила. Нужно, когда скил зовёт файл вне своей папки (напр. plugin-root
#              scripts/). Коллизия destination с родной записью скила — ошибка установки.
#
# Каждый скил в ~/.claude/skills — реальная папка-зеркало с per-file symlink'ами.
# Имя скила = имя его папки. Конфликт имён между источниками — ошибка установки
# (cli сообщит и пропустит дубль).
#
# Источники агентов
# -----------------
# Каждый источник агентов — отдельный [[agents]] (репо + сабмодули). path → папка
# с *.md-агентами; имя файла без .md = имя агента в ~/.claude/agents. Поля
# path/include/exclude — как у [[skills]] (include — имена без .md). Конфликт имён —
# первое вхождение (как у скилов). Поштучного вкл/выкл у агентов нет: все линкуются.
#
# Выключенные скилы
# -----------------
# disabled — список имён скилов, которые не линковать (поштучно, поверх источников).
# Здесь — базовые/версионные выключения. TUI (`uv run claude-agents manage`) в этот
# файл НЕ пишет: toggle правит config.local.toml (gitignored), его disabled
# объединяется с этим. Так состояние вкл/выкл из UI не пачкает версионный config.toml.
#
# Локальный overlay: config.local.toml (в .gitignore) переопределяет этот файл.
#   - [[skills]]/[[agents]] с тем же path заменяет здешний (include/exclude из local);
#   - новый path добавляется;
#   - enabled = false выключает источник;
#   - disabled из local объединяется с базовым.
# Удобно, если на форке/машине нужны другие скилы без правки версионного файла.

disabled = []

# --- Скилы --------------------------------------------------------------------

# Локальные скилы репо.
[[skills]]
path = "skills"
include = "*"

[[skills]]
path = "contrib/blender-skills"
include = "*"
# exclude = ["threejs-export"]

[[skills]]
path = "contrib/infostyle-skill/skills"
include = "*"

[[skills]]
path = "contrib/claude-seo/skills"
include = "*"
  # scripts/ лежит на plugin-root рядом со skills/; скилы зовут python3 scripts/X.py
  # относительно своей папки — линкуем его в каждое зеркало seo-скила.
  [[skills.symlinks]]
  source = "contrib/claude-seo/scripts"
  destination = "scripts"

# --- Агенты -------------------------------------------------------------------

# Локальные агенты репо.
[[agents]]
path = "agents"
include = "*"

[[agents]]
path = "contrib/claude-seo/agents"
include = "*"
