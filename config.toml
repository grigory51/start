# config.toml — start: переносимый сетап машины. Что линковать в ~/.claude (агенты,
# навыки, плагины, MCP, hooks) и в $HOME (dotfiles).
#
# Локальный overlay
# -----------------
# config.local.toml (gitignore) переопределяет `enabled` источников для ТЕКУЩЕЙ машины.
# Формат: [local.<section>] "<key>" = <enabled>, где section ∈ skills/agents/commands/
# plugins/mcp; key — path источника (или name для mcp). Эффективный enabled = overlay,
# если ключ есть, иначе значение отсюда. В TUI: `t` тоглит локально, `g` — глобально (тут).
#
# Источники скилов
# ----------------
# Каждый источник скилов — отдельный [[skills]], включая локальную папку repo/skills.
# Порядок записей задаёт приоритет при конфликте имён (берётся первое вхождение).
#
#   path     — путь к папке-источнику относительно корня репо. Внутри неё каждый
#              подкаталог с SKILL.md считается скилом.
#   enabled  — какие скилы включить: ["*"] (все, по умолчанию), список имён папок
#              (["a","c"]) либо [] (ни одного = источник выключен). TUI
#              (`uv run start manage`) правит это поле прямо в этом файле.
#   exclude  — какие скилы вообще не показывать (имена папок). Поверх enabled.
#   symlinks — список [[skills.symlinks]] = {source, destination}: доп. symlink,
#              добавляемый в КАЖДОЕ зеркало скила этого источника. source — путь
#              относительно корня репо; destination — имя/путь внутри папки-зеркала
#              скила. Нужно, когда скил зовёт файл вне своей папки (напр. plugin-root
#              scripts/). Коллизия destination с родной записью скила — ошибка установки.
#   requirements — список [[skills.requirements]] = {name, check, hint}: внешние
#              зависимости скилов источника (та же схема, что у [[plugins.requirements]]).
#              check — shell-команда проверки (rc 0 = есть), hint — как поставить.
#              Менеджер при up проверяет и при отсутствии печатает hint (сам НЕ ставит).
#              Применяются ко всем скилам источника; проверяются раз на источник, если
#              включён хотя бы один его скил. Напр. локальный плеер/рантайм для рендера.
#
# Каждый скил в ~/.claude/skills — реальная папка-зеркало с per-file symlink'ами.
# Имя скила = имя его папки. Конфликт имён между источниками — ошибка установки
# (cli сообщит и пропустит дубль).
#
# Источники агентов
# -----------------
# Каждый источник агентов — отдельный [[agents]] (репо + сабмодули). path → папка
# с *.md-агентами; имя файла без .md = имя агента в ~/.claude/agents. Поля
# path/enabled/exclude — как у [[skills]] (enabled — имена без .md). Конфликт имён —
# первое вхождение (как у скилов). У агентов нет TUI-toggle, но enabled-список тоже
# действует: линкуются только включённые им.

# --- Скилы --------------------------------------------------------------------

# Локальные скилы репо.
[[skills]]
path = "skills"
enabled = ["*"]

[[skills]]
path = "contrib/blender-skills"
enabled = ["image-to-3d", "multi-image-to-3d", "threejs-export"]
# exclude = ["threejs-export"]

# lottie — text-to-Lottie: генерация/правка Lottie/Bodymovin JSON под локальный
# Skia Skottie player. Сабмодуль — full app (React/Vite); скилы лежат в skills/,
# берём только text-to-lottie. Скил self-contained (references/ внутри папки).
[[skills]]
path = "contrib/lottie/skills"
enabled = ["text-to-lottie"]
  # Скил рендерит/верифицирует сцены в официальном Skia Skottie player — это app
  # из того же сабмодуля (contrib/lottie), запускается через bun. Без bun плеер не
  # поднять, верификация сцен невозможна. Менеджер проверяет bun и подсказывает.
  [[skills.requirements]]
  name = "bun"
  check = "command -v bun"
  hint = "curl -fsSL https://bun.sh/install | bash  (или brew install oven-sh/bun/bun). Затем плеер: cd contrib/lottie && bun install && bun dev"

# --- Агенты -------------------------------------------------------------------

# Локальные агенты репо. (Агенты плагинов идут через [[plugins]], не сюда.)
[[agents]]
path = "agents"
enabled = ["*"]

# --- Плагины (нативные CC) ----------------------------------------------------
#
# Источник с .claude-plugin/ (plugin.json + marketplace.json). НЕ симлинкуется:
# менеджер собирает плагин в plugin seed (.seed/) через `claude plugin install` и
# отдаёт CC через CLAUDE_CODE_PLUGIN_SEED_DIR. CC сам подключает skills/agents/
# commands/hooks/MCP плагина. Требует `claude` в PATH (иначе фаза пропускается).
#
#   path     — корень плагина (каталог с .claude-plugin/).
#   enabled  — bool: включить плагин целиком (плагин атомарен).
#   marketplace / plugin — override имён, если автодетект из манифеста не сработал.
#   [[plugins.requirements]] — внешние зависимости плагина (бинари): name/check/hint.
#              `check` — shell-команда проверки (rc 0 = есть), `hint` — как поставить.
#              Менеджер при up проверяет и при отсутствии печатает hint (сам НЕ ставит).

[[plugins]]
path = "contrib/claude-seo"
enabled = true

[[plugins]]
path = "contrib/infostyle-skill"
enabled = true

[[plugins]]
path = "contrib/caveman"
enabled = true

# ast-index — структурный поиск по коду (символы/вызовы/иерархии) вместо grep.
# Плагин даёт скил/правила/команды; сам бинарь ast-index ставится отдельно (см.
# [[plugins.requirements]]). Команды: search/usages/implementations/callers/outline/...
[[plugins]]
path = "contrib/ast-index"
enabled = true
  # Бинарь ast-index не входит в плагин — менеджер проверяет наличие и подсказывает.
  [[plugins.requirements]]
  name = "ast-index"
  check = "command -v ast-index"
  hint = "brew tap defendend/ast-index && brew trust defendend/ast-index && brew install ast-index"

# claude-mem — персистентная память между сессиями: захват наблюдений через
# lifecycle-хуки, AI-сжатие в summary, поиск по MCP. Плагин лежит в подкаталоге
# plugin/ сабмодуля (marketplace.json в корне указывает source = ./plugin), поэтому
# path — корень сабмодуля (ref: claude-mem@thedotmack). SessionStart-хук поднимает
# worker-service на локальном порту (по умолчанию 37701; SQLite + векторный индекс),
# рантайм — через bun. Требует node>=20 и bun — менеджер проверяет и подсказывает,
# сам не ставит. Рантайм-deps плагина ставятся отдельно: bun install в plugin/.
[[plugins]]
path = "contrib/claude-mem"
enabled = true
  [[plugins.requirements]]
  name = "node>=20"
  check = "command -v node && node -e 'process.exit(+process.versions.node.split(\".\")[0]>=20?0:1)'"
  hint = "1. Install nvm (https://github.com/nvm-sh/nvm)  2. nvm install --lts"
  [[plugins.requirements]]
  name = "bun"
  check = "command -v bun"
  hint = "curl -fsSL https://bun.sh/install | bash  (или brew install oven-sh/bun/bun)"

# --- Slash-команды ------------------------------------------------------------
#
# Рассыпанные *.md команды (как [[agents]]): имя файла без .md = имя команды,
# symlink в ~/.claude/commands/. Команды плагинов идут через [[plugins]].
#
# [[commands]]
# path = "commands"
# enabled = ["*"]

# --- MCP-серверы (user-scope) -------------------------------------------------
#
# Глобальные (user-scope) MCP: менеджер пишет включённые в ~/.claude.json (top-level
# mcpServers) — CC читает MCP только оттуда, НЕ из settings.json. inline-спека
# [mcp.server] (command/args/env | url/headers); env ${VAR} как литерал (CC разворачивает).
#   name     — имя сервера в ~/.claude.json.
#   enabled  — bool. Машино-специфично включать через config.local.toml ([local.mcp]).
#
# monium_mcp — нужен только на рабочей машине (Аркадия). В git выключен; на нужной
# машине включается: config.local.toml → [local.mcp] monium_mcp = true (или `t` в TUI).
[[mcp]]
name = "monium_mcp"
enabled = false
[mcp.server]
command = "ya"
args = ["tool", "mcp", "connect", "mcp.yandex.net/ws?servers=monium_mcp"]

# --- Env (переменные окружения в ~/.claude/settings.json) ---------------------
#
# Произвольные env для CC, менеджер мержит их в settings.json `env` (managed, sidecar).
# ENABLE_CLAUDEAI_MCP_SERVERS=false — отключить claude.ai connectors (напр. Google Drive),
# которые синхронятся из аккаунта claude.ai, а не из этого репо.
[env]
ENABLE_CLAUDEAI_MCP_SERVERS = "false"

# --- Statusline --------------------------------------------------------------
#
# Своя плашка статусбара. Файл линкуется в ~/.claude/<dest>, а settings.json
# `statusLine` прописывается менеджером (managed, через sidecar). Убери секцию —
# менеджер снимет statusLine (по sidecar), не трогая чужой.

[statusline]
path = "statusline/statusline.mjs"   # *.mjs/*.sh относительно корня репо
dest = "statusline.mjs"              # имя в ~/.claude/
command = "node ${CLAUDE_CONFIG_DIR:-$HOME/.claude}/statusline.mjs"
  # Команда statusline требует node (файл — .mjs). Без node CC молча не запускает
  # статусбар (плашка не появляется) — менеджер проверяет наличие и подсказывает.
  [[statusline.requirements]]
  name = "node"
  check = "command -v node"
  hint = "1. Install nvm (https://github.com/nvm-sh/nvm)  2. nvm install --lts"

# --- Hooks (авто-регистрация событий) -----------------------------------------
#
# Зарегистрировать loose-hook (hooks/*.sh) на события CC в ~/.claude/settings.json.
# Файл симлинкается в ~/.claude/hooks/, команда `bash "<...>"` прописывается на events.
#
[[hooks]]
path = "hooks/notify.sh"
events = ["Stop", "Notification"]

[[hooks]]
path = "hooks/focus-track.sh"
events = ["UserPromptSubmit"]

# --- Dotfiles (симлинки в $HOME) ---------------------------------------------
#
# Переносимые dotfiles машины: файл/папка репо → симлинк в $HOME. Не про Claude
# Code — про общий сетап. source относительно корня репо; target — путь в $HOME
# (поддержка ~ и абсолютных; недостающие родительские каталоги создаются). Чужой
# файл на target: backup в <name>.bak при `start up --force`, иначе пропуск с
# предупреждением. Наш корректный симлинк — idempotent (пропуск). Прун снятых
# записей НЕ делается (небезопасно итерировать $HOME) — убрал запись, симлинк
# снимаешь сам. Файлы хранить в dotfiles/ (без ведущей точки — точка в target).
[[dotfiles]]
source = "dotfiles/vimrc"
target = "~/.vimrc"
