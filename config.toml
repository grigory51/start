# config.toml — что линковать в ~/.claude (агенты, навыки, hooks)
#
# Источники скилов
# ----------------
# Каждый источник скилов — отдельный [[source]], включая локальную папку repo/skills.
# Порядок записей задаёт приоритет при конфликте имён (берётся первое вхождение).
#
#   path     — путь к папке-источнику относительно корня репо. Внутри неё каждый
#              подкаталог с SKILL.md считается скилом.
#   include  — какие скилы брать: "*" (все) либо список имён папок. По умолчанию "*".
#   exclude  — какие скилы НЕ брать (имена папок). Применяется поверх include.
#   enabled  — false выключает весь источник целиком.
#
# Имя скила в ~/.claude/skills = имя его папки. Конфликт имён между источниками —
# ошибка установки (cli сообщит и пропустит дубль).
#
# Выключенные скилы
# -----------------
# disabled — список имён скилов, которые не линковать (поштучно, поверх источников).
# Здесь — базовые/версионные выключения. TUI (`uv run claude-agents manage`) в этот
# файл НЕ пишет: toggle правит config.local.toml (gitignored), его disabled
# объединяется с этим. Так состояние вкл/выкл из UI не пачкает версионный config.toml.
#
# Локальный overlay: config.local.toml (в .gitignore) переопределяет этот файл.
#   - [[source]] с тем же path заменяет здешний (include/exclude берутся из local);
#   - новый path добавляется;
#   - enabled = false выключает источник;
#   - disabled из local объединяется с базовым.
# Удобно, если на форке/машине нужны другие скилы без правки версионного файла.

disabled = []

# Локальные скилы репо.
[[source]]
path = "skills"
include = "*"

[[source]]
path = "contrib/blender-skills"
include = "*"
# exclude = ["threejs-export"]

[[source]]
path = "contrib/infostyle-skill/skills"
include = "*"
